<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuck All Resources</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:white;}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.logo{font-size:22px;font-weight:bold;}

.search-box input{
  padding:8px 15px;
  border-radius:30px;
  border:none;
  outline:none;
  width:220px;
}

.container{padding:40px;}
h2{margin:30px 0 15px;}

/* 🔥 SMOOTH SLIDER */
.slider{
  overflow:hidden;
  position:relative;
}

.slider-track{
  display:flex;
  gap:20px;
  will-change:transform;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  margin-top:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  transition:0.4s;
  min-width:250px;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.image-wrapper{position:relative;}

.image-wrapper img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.badge{
  position:absolute;
  top:10px;
  right:10px;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.free{background:#22c55e;}
.premium{background:#ef4444;}

.card-body{padding:15px;}
.card-body h3{margin-bottom:10px;font-size:16px;}

.card-body button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.card-body button:disabled{
  background:#f59e0b;
}

@media(max-width:768px){
  .navbar{flex-direction:column;gap:15px;}
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">Fuck All Resources</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search batches..." onkeyup="searchBatches()">
  </div>
</div>

<div class="container">

  <h2>🔥 Newly Added</h2>
  <div class="slider">
    <div class="slider-track" id="newBatches"></div>
  </div>

  <h2>📚 All Batches</h2>
  <div class="grid" id="allBatches"></div>

</div>

<script>

/* ===========================
   🔥 SIRF YAHAN DATA ADD KARO
   NEW BATCHES HAMESHA LAST ME ADD KARO
   =========================== */

const batches = [
  {title:"Batch 1", image:"images/1.jpg", link:"batches/1.html", type:"free"},
  {title:"Batch 2", image:"images/2.jpg", link:"batches/2.html", type:"premium"},
  {title:"Batch 3", image:"images/3.jpg", link:"batches/3.html", type:"free"},
  {title:"Batch 4", image:"images/4.jpg", link:"batches/4.html", type:"free"},
  {title:"Batch 5", image:"images/5.jpg", link:"batches/5.html", type:"premium"},
  {title:"Batch 6", image:"images/6.jpg", link:"batches/6.html", type:"free"},
  {title:"Batch 7", image:"images/7.jpg", link:"batches/7.html", type:"free"},
  {title:"Batch 8", image:"images/8.jpg", link:"batches/8.html", type:"premium"},
  {title:"Batch 9", image:"images/9.jpg", link:"batches/9.html", type:"free"},
  {title:"Batch 10", image:"images/10.jpg", link:"batches/10.html", type:"free"},
];

/* =========================== */

const newContainer = document.getElementById("newBatches");
const allContainer = document.getElementById("allBatches");

// 🔥 Latest 10 automatically
const newBatches = batches.slice(-10).reverse();

function createCard(batch){
  return `
  <div class="card batch-card">
    <div class="image-wrapper">
      <img src="${batch.image}">
      <span class="badge ${batch.type}">${batch.type.toUpperCase()}</span>
    </div>
    <div class="card-body">
      <h3>${batch.title}</h3>
      <button onclick="startCountdown(this,'${batch.link}')">
        View Classes
      </button>
    </div>
  </div>`;
}

// Duplicate for seamless loop
newContainer.innerHTML =
  newBatches.map(createCard).join("") +
  newBatches.map(createCard).join("");

// 🔥 TRUE SMOOTH CONTINUOUS SCROLL
let position = 0;

function smoothScroll(){
  position += 0.4; // speed control

  if(position >= newContainer.scrollWidth / 2){
    position = 0;
  }

  newContainer.style.transform = `translateX(-${position}px)`;
  requestAnimationFrame(smoothScroll);
}

smoothScroll();

// Add all to grid
batches.forEach(batch=>{
  allContainer.innerHTML += createCard(batch);
});

function startCountdown(button, link){
  let seconds = 15;
  button.disabled = true;
  button.innerText = "Redirecting in "+seconds+"s";

  let timer = setInterval(()=>{
    seconds--;
    button.innerText = "Redirecting in "+seconds+"s";

    if(seconds<=0){
      clearInterval(timer);
      window.location.href = link;
    }
  },1000);
}

function searchBatches(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.getElementsByClassName("batch-card");

  for(let i=0;i<cards.length;i++){
    let text = cards[i].innerText.toLowerCase();
    cards[i].style.display = text.includes(input) ? "block" : "none";
  }
}


// Disable right click
document.addEventListener('contextmenu', event => event.preventDefault());

// Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
document.addEventListener('keydown', function(e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && e.key === "I") ||
    (e.ctrlKey && e.shiftKey && e.key === "J") ||
    (e.ctrlKey && e.key === "U")
  ) {
    e.preventDefault();
  }
});


</script>

</body>
</html>
